<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Management</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#006400;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:800px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#006400;
color:white;
padding:12px;
width:100%;
border:none;
cursor:pointer;
border-radius:5px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

table,th,td{
border:1px solid #ccc;
}

th{
background:#006400;
color:white;
}

th,td{
padding:10px;
text-align:center;
}
</style>
</head>

<body>

<header>
<h2>Attendance Management</h2>
</header>

<div class="container">

<input type="text" id="member" placeholder="Member Name">

<input type="date" id="date">

<select id="status">
<option>Present</option>
<option>Absent</option>
<option>Leave</option>
</select>

<button onclick="addAttendance()">Save Attendance</button>

<table id="table">
<tr>
<th>Member</th>
<th>Date</th>
<th>Status</th>
</tr>
</table>

</div>

<script>
function addAttendance(){

let member=document.getElementById("member").value;
let date=document.getElementById("date").value;
let status=document.getElementById("status").value;

if(member==""||date==""){
alert("Please fill all fields");
return;
}

let table=document.getElementById("table");

let row=table.insertRow();

row.insertCell(0).innerHTML=member;
row.insertCell(1).innerHTML=date;
row.insertCell(2).innerHTML=status;

}
</script>

</body>
</html>
