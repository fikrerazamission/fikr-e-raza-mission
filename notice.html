<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notice Board</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f4f4;
}

header{
background:#006400;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:900px;
margin:20px auto;
padding:20px;
}

.notice{
background:white;
padding:20px;
margin-bottom:15px;
border-left:6px solid #006400;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.notice h3{
margin:0;
color:#006400;
}

.notice p{
margin-top:10px;
}

.date{
color:gray;
font-size:14px;
}
</style>

</head>

<body>

<header>
<h1>Notice Board</h1>
</header>

<div class="container">

<div class="notice">
<h3>Monthly Meeting</h3>
<p>Monthly meeting will be held on the first Sunday of every month.</p>
<div class="date">02 July 2026</div>
</div>

<div class="notice">
<h3>Membership Drive</h3>
<p>New members can register through the official website.</p>
<div class="date">02 July 2026</div>
</div>

<div class="notice">
<h3>PDF Library Updated</h3>
<p>New Islamic books and documents have been added.</p>
<div class="date">02 July 2026</div>
</div>

</div>

</body>
</html>
