<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notice Board</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#006400;
color:white;
padding:15px;
text-align:center;
}

.container{
width:95%;
max-width:1000px;
margin:20px auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
margin-bottom:20px;
}

textarea,input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

textarea{
height:120px;
resize:none;
}

button{
padding:12px 20px;
background:#006400;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#008000;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#006400;
color:white;
}
</style>

</head>

<body>

<header>
<h1>Notice Board</h1>
</header>

<div class="container">

<div class="card">

<h2>Add Notice</h2>

<input type="text" id="title" placeholder="Notice Title">

<textarea id="message" placeholder="Write Notice"></textarea>

<button onclick="addNotice()">Publish Notice</button>

</div>

<input
type="text"
id="search"
placeholder="Search Notice..."
onkeyup="searchNotice()">

<table>

<thead>
<tr>
<th>Title</th>
<th>Notice</th>
<th>Action</th>
</tr>
</thead>

<tbody id="noticeTable">

</tbody>

</table>

</div>
