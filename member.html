<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Dashboard</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:#006400;
color:#fff;
padding:15px;
text-align:center;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.2);
transition:.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
}

h3{
color:#006400;
}
</style>
</head>

<body>

<header>
<h1>Member Dashboard</h1>
</header>

<div class="container">

<div class="card">
<h3>👤 My Profile</h3>
</div>

<div class="card">
<h3>🪪 My ID Card</h3>
</div>

<div class="card">
<h3>📅 My Attendance</h3>
</div>

<div class="card">
<h3>📚 PDF Library</h3>
</div>

<div class="card">
<h3>💳 Payment History</h3>
</div>

<div class="card">
<h3>📢 Notices</h3>
</div>

<div class="card">
<h3>📞 Contact</h3>
</div>

<div class="card">
<h3>🚪 Logout</h3>
</div>

</div>

</body>
</html>
