
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Library</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#006400;
color:white;
padding:15px;
text-align:center;
}

.container{
width:95%;
max-width:1000px;
margin:20px auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:12px 20px;
background:#006400;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#008000;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#006400;
color:white;
}
</style>

</head>

<body>

<header>
<h1>PDF Library</h1>
</header>

<div class="container">

<div class="card">

<h2>Upload PDF</h2>

<input type="text" id="pdfName" placeholder="PDF Name">

<select id="category">
<option value="">Select Category</option>
<option>Books</option>
<option>Fatwa</option>
<option>Notice</option>
<option>Magazine</option>
</select>

<input type="file" id="pdfFile" accept=".pdf">

<button onclick="addPDF()">Add PDF</button>

</div>

<input
type="text"
id="search"
placeholder="Search PDF..."
onkeyup="searchPDF()">

<table>

<thead>

<tr>
<th>Name</th>
<th>Category</th>
<th>File</th>
<th>Action</th>
</tr>

</thead>

<tbody id="pdfTable">

</tbody>

</table>

</div>
