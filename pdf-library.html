<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Library</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}
header{
background:#006400;
color:white;
padding:15px;
text-align:center;
}
.container{
max-width:900px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
}
input{
width:100%;
padding:10px;
margin:10px 0;
}
button{
background:#006400;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
}
table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}
table,th,td{
border:1px solid #ccc;
}
th,td{
padding:10px;
text-align:center;
}
th{
background:#006400;
color:white;
}
</style>

</head>

<body>

<header>
<h2>PDF Library</h2>
</header>

<div class="container">

<input type="text" id="title" placeholder="PDF Title">

<input type="file" id="pdf" accept=".pdf">

<button onclick="uploadPDF()">
Upload PDF
</button>

<table id="pdfTable">

<tr>
<th>Title</th>
<th>Status</th>
</tr>

</table>

</div>

<script>

function uploadPDF(){

let title=document.getElementById("title").value;

if(title==""){
alert("Enter PDF Title");
return;
}

let table=document.getElementById("pdfTable");

let row=table.insertRow();

row.insertCell(0).innerHTML=title;
row.insertCell(1).innerHTML="Uploaded";

document.getElementById("title").value="";

}

</script>

</body>
</html>
