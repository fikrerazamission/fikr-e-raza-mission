<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}
header{
background:#006400;
color:#fff;
padding:15px;
text-align:center;
}
.container{
max-width:800px;
margin:20px auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}
label{
font-weight:bold;
display:block;
margin-top:15px;
}
input,select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}
button{
margin-top:20px;
width:100%;
padding:12px;
background:#006400;
color:#fff;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}
</style>

</head>
<body>

<header>
<h2>Settings</h2>
</header>

<div class="container">

<label>Organization Name</label>
<input type="text" value="FIKR-E-RAZA Mission">

<label>Admin Email</label>
<input type="email" value="fikrerazamission7@gmail.com">

<label>Language</label>
<select>
<option>English</option>
<option>Hindi</option>
<option>Urdu</option>
</select>

<label>Upload Logo</label>
<input type="file">

<label>Change Password</label>
<input type="password" placeholder="New Password">

<button>Save Settings</button>

</div>

</body>
</html>
