<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f4f4;
}

header{
background:#006400;
color:#fff;
padding:15px;
text-align:center;
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
text-align:center;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
}

h3{
color:#006400;
}
</style>

</head>
<body>

<header>
<h1>FIKR-E-RAZA Mission Admin Panel</h1>
</header>

<div class="container">

<div class="card"><h3>👥 Members</h3></div>

<div class="card"><h3>📅 Attendance</h3></div>

<div class="card"><h3>📄 PDF Library</h3></div>

<div class="card"><h3>💰 Payments</h3></div>

<div class="card"><h3>💸 Expenses</h3></div>

<div class="card"><h3>📰 Notices</h3></div>

<div class="card"><h3>🪪 ID Cards</h3></div>

<div class="card"><h3>⚙ Settings</h3></div>

</div>

</body>
</html>
