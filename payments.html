<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#006400;
color:white;
padding:15px;
text-align:center;
}

.container{
width:95%;
max-width:1000px;
margin:20px auto;
}

.form-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
margin-bottom:20px;
}

.form-box h2{
color:#006400;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:12px 20px;
background:#006400;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#008000;
}

.search{
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#006400;
color:white;
}

@media(max-width:768px){

table{
font-size:14px;
}

button{
width:100%;
}

}

</style>

</head>

<body>

<header>
<h1>Payment Management</h1>
</header>

<div class="container">

<div class="form-box">

<h2>Add Payment</h2>

<input type="text" id="memberName" placeholder="Member Name">

<input type="number" id="amount" placeholder="Amount">

<input type="date" id="paymentDate">

<button onclick="addPayment()">
Add Payment
</button>

</div>

<input
class="search"
type="text"
id="search"
placeholder="Search Payment..."
onkeyup="searchPayment()">

<table>

<thead>

<tr>

<th>Member</th>
<th>Amount</th>
<th>Date</th>
<th>Action</th>

</tr>

</thead>

<tbody id="paymentTable">

</tbody>

</table>

</div>

<script>
