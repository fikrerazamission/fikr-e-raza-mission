<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Management</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;}
header{background:#006400;color:#fff;padding:15px;text-align:center;}
.container{max-width:900px;margin:20px auto;background:#fff;padding:20px;border-radius:10px;}
input,select{
width:100%;
padding:10px;
margin:10px 0;
}
button{
width:100%;
padding:12px;
background:#006400;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
}
table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}
table,th,td{
border:1px solid #ccc;
}
th{
background:#006400;
color:#fff;
}
th,td{
padding:10px;
text-align:center;
}
</style>

</head>
<body>

<header>
<h2>Payment Management</h2>
</header>

<div class="container">

<input type="text" id="name" placeholder="Member Name">

<input type="number" id="amount" placeholder="Amount">

<select id="type">
<option>Membership Fee</option>
<option>Donation</option>
<option>Other</option>
</select>

<button onclick="savePayment()">Save Payment</button>

<table id="paymentTable">
<tr>
<th>Name</th>
<th>Amount</th>
<th>Type</th>
</tr>
</table>

</div>

<script>
function savePayment(){

let name=document.getElementById("name").value;
let amount=document.getElementById("amount").value;
let type=document.getElementById("type").value;

if(name==""||amount==""){
alert("Fill all fields");
return;
}

let table=document.getElementById("paymentTable");

let row=table.insertRow();

row.insertCell(0).innerHTML=name;
row.insertCell(1).innerHTML="₹ "+amount;
row.insertCell(2).innerHTML=type;

document.getElementById("name").value="";
document.getElementById("amount").value="";
}
</script>

</body>
</html>
