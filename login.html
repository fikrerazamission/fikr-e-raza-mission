<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIKR-E-RAZA Mission - Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{

background:white;
width:350px;
padding:30px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.2);

}

h2{

text-align:center;
color:#006400;
margin-bottom:20px;

}

input{

width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;

}

button{

width:100%;
padding:12px;
background:#006400;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;

}

button:hover{

background:#008000;

}

p{

text-align:center;
margin-top:15px;

}

a{

text-decoration:none;
color:#006400;

}

</style>

</head>

<body>

<div class="login-box">

<h2>FIKR-E-RAZA Mission</h2>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">

Login

</button>

<p>

Back to
<a href="index.html">

Home

</a>

</p>

</div>

<script>

function login(){

let user=document.getElementById("username").value;

let pass=document.getElementById("password").value;

if(user=="admin" && pass=="12345"){

alert("Admin Login Successful");

window.location="admin.html";

}

else{

alert("Wrong Username or Password");

}

}

</script>

</body>
</html>
